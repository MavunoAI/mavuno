name: LlamaBindings

description: |
  Dart FFI bindings for llama.cpp

output: lib/src/native/ffi/llama_bindings.dart

headers:
  entry-points:
    - ../../third_party/llama.cpp/include/llama.h

compiler-opts:
  - "-I../../third_party/llama.cpp/include"

comments: false

functions:
  include:
    - "^llama_.*"

structs:
  include:
    - "^llama_.*"

unions:
  include:
    - "^llama_.*"

enums:
  include:
    - "^llama_.*"

typedefs:
  include:
    - "^llama_.*"

macros:
  include:
    - "^LLAMA_.*"
