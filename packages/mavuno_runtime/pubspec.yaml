name: mavuno_runtime
description: Offline inference runtime for the Mavuno AI Platform.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  mavuno_foundation:
    path: ../mavuno_foundation

include: package:lints/recommended.yaml

analyzer:
  exclude:
    - "**/.dart_tool/**"
    - "**/build/**"

dev_dependencies:
  lints: ^6.0.0
  test: ^1.26.3
